name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: vet
        run: go vet ./...

      - name: fmt
        run: gofmt -w -s . && git diff --exit-code

      - name: fix
        run: go fix ./... && git diff --exit-code

      - name: test
        run: go test ./...
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
