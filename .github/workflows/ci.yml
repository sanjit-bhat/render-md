name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: vet
        run: go vet ./...

      - name: fmt
        run: test -z "$(gofmt -l .)"

      - name: fix
        run: go fix ./...

      - name: test
        run: go test ./...
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
